<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <!-- Favicon. The 512x512 PNG is the primary source — modern browsers
       downsample it to whatever pixel size they need (16 in tabs, 32 in
       bookmarks, up to 192 for pinned shortcuts) for a much sharper
       result than the small bitmaps. The 32 and 16 PNG sizes stay so
       browsers that explicitly ask for them don't have to downsample
       the big image. The .ico is the legacy fallback for very old
       browsers (IE 11 etc.) that can't read PNG favicons. -->
  <link rel="icon" type="image/png" href="/favicon.png" sizes="512x512">
  <link rel="icon" type="image/png" href="/favicon-32x32.png" sizes="32x32">
  <link rel="icon" type="image/png" href="/favicon-16x16.png" sizes="16x16">
  <link rel="icon" href="/favicon.ico" sizes="any">

  <!-- iOS / iPadOS home screen icon -->
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f0e8ff">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Glass Keep</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
